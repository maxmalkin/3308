name: Server Tests

on:
    push:
        branches: [main]
        paths:
            - "ProjectSourceCode/server/**"
    pull_request:
        paths:
            - "ProjectSourceCode/server/**"

jobs:
    test:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ProjectSourceCode

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  package_json_file: ProjectSourceCode/package.json

            - uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - run: pnpm install --frozen-lockfile

            - run: pnpm test
              working-directory: ProjectSourceCode/server