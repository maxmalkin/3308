name: Notify on Workflow Failure

on:
  workflow_run:
    workflows:
      - Build & Lint
      - Server Tests
    types: [completed]

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    uses: ./.github/workflows/discord-notify.yml
    with:
      message: |
        🚨 **${{ github.event.workflow_run.name }}** failed on `${{ github.event.workflow_run.head_branch }}`.
        Triggered by ${{ github.event.workflow_run.actor.login }}.
        Logs: ${{ github.event.workflow_run.html_url }}
    secrets: inherit
