name: Build & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ProjectSourceCode

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: ProjectSourceCode/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

  build-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ProjectSourceCode

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: ProjectSourceCode/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        working-directory: ProjectSourceCode/client
