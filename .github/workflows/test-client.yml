name: Client Tests

on:
    push:
        branches: [main]
        paths:
            - "ProjectSourceCode/client/**"
            - "ProjectSourceCode/pnpm-lock.yaml"
    pull_request:
        paths:
            - "ProjectSourceCode/client/**"
            - "ProjectSourceCode/pnpm-lock.yaml"

jobs:
    test:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ProjectSourceCode

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  package_json_file: ProjectSourceCode/package.json

            - uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: pnpm
                  cache-dependency-path: ProjectSourceCode/pnpm-lock.yaml

            - run: pnpm install --frozen-lockfile

            - run: pnpm test
              working-directory: ProjectSourceCode/client
