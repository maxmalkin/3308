<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="min-h-screen bg-gray-50 text-gray-900">
    <!-- Navbar placeholder -->
    <nav class="w-full bg-white shadow-sm px-6 py-4">
      <h1 class="text-xl font-bold">Navbar</h1>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8 grid grid-cols-12 gap-8">

      <section class="col-span-9">

        <h1 class="text-2xl font-bold mb-6">Home</h1>

        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-4">
            <h2 class="text-xl font-bold">Your Recommendations at a Glance</h2>

            <a
              href="../recommendations/recommendations.html"
              class="text-sm font-medium text-blue-600 hover:text-blue-800 transition"
            >
              See more →
            </a>
          </div>

          <button
            class="px-4 py-2 rounded-md bg-green-600 text-white font-medium hover:bg-green-700"
            data-bs-toggle="modal"
            data-bs-target="#logModal"
          >
            + Log
          </button>
        </div>

        <div class="grid grid-cols-4 gap-4">
          <div class="h-40 rounded-lg bg-gray-200"></div>
          <div class="h-40 rounded-lg bg-gray-200"></div>
          <div class="h-40 rounded-lg bg-gray-200"></div>
          <div class="h-40 rounded-lg bg-gray-200"></div>

          <div class="h-40 rounded-lg bg-gray-200"></div>
          <div class="h-40 rounded-lg bg-gray-200"></div>
          <div class="h-40 rounded-lg bg-gray-200"></div>
          <div class="h-40 rounded-lg bg-gray-200"></div>
        </div>

      </section>

      <aside class="col-span-3">

        <a
          href="../queue/queue.html"
          class="text-xl font-bold mb-4 block hover:text-blue-700 transition"
        >
          Queue
        </a>

        <div class="space-y-4">
          <div class="p-4 bg-white rounded-lg shadow border">
            <p class="font-semibold">Title</p>
            <p class="text-sm text-gray-600">Status: In Progress</p>
          </div>

          <div class="p-4 bg-white rounded-lg shadow border">
            <p class="font-semibold">Title</p>
            <p class="text-sm text-gray-600">Status: In Progress</p>
          </div>

          <div class="p-4 bg-white rounded-lg shadow border">
            <p class="font-semibold">Title</p>
            <p class="text-sm text-gray-600">Status: Not Started</p>
          </div>

          <div class="p-4 bg-white rounded-lg shadow border">
            <p class="font-semibold">Title</p>
            <p class="text-sm text-gray-600">Status: Not Started</p>
          </div>
        </div>

      </aside>

    </main>

    <div
      class="modal fade"
      id="logModal"
      tabindex="-1"
      aria-labelledby="logModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content rounded-2xl shadow-lg">

          <!-- HEADER -->
          <div class="modal-header">
            <h5 class="modal-title text-lg font-semibold" id="logModalLabel">
              Log Your Thoughts
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

        <div class="modal-body space-y-4">

        <input
            type="text"
            placeholder="Search"
            class="w-full rounded-md border px-3 py-2"
        />

        <div class="flex items-center justify-between gap-4">

        <div class="flex gap-3">
            <select
            id="seasonSelect"
            class="px-4 py-2 bg-slate-600 text-white rounded-md cursor-pointer"
            >
            <option value="">Season (Optional)</option>
            <option value="1">Season 1</option>
            <option value="2">Season 2</option>
            <option value="3">Season 3</option>
            </select>

            <select
            id="episodeSelect"
            class="px-4 py-2 bg-slate-600 text-white rounded-md cursor-pointer"
            >
            <option value="">Episode (Optional)</option>
            <option value="1">Episode 1</option>
            <option value="2">Episode 2</option>
            <option value="3">Episode 3</option>
            </select>
        </div>

        <div class="flex items-center gap-8">

            <div id="starRating" class="flex text-4xl gap-1 cursor-pointer select-none">
            <span data-value="1" class="text-gray-300">★</span>
            <span data-value="2" class="text-gray-300">★</span>
            <span data-value="3" class="text-gray-300">★</span>
            <span data-value="4" class="text-gray-300">★</span>
            <span data-value="5" class="text-gray-300">★</span>
            </div>

            <input type="hidden" id="ratingValue" value="0" />

            <label class="flex items-center gap-3 text-lg">
            <input type="checkbox" class="scale-125" />
            Spoilers
            </label>

        </div>

        </div>

        <textarea
            class="w-full rounded-md border px-3 py-2"
            rows="5"
            placeholder="Tell us what you think..."
        ></textarea>

        </div>

          <div class="modal-footer flex justify-between">
            <button
              type="button"
              class="px-4 py-2 bg-red-600 text-white rounded-md"
              data-bs-dismiss="modal"
            >
              Discard
            </button>

            <button
              type="button"
              class="px-4 py-2 bg-green-600 text-white rounded-md"
            >
              Post
            </button>
          </div>

        </div>
      </div>
    </div>

    <script>
      const stars = document.querySelectorAll("#starRating span");
      const ratingInput = document.getElementById("ratingValue");
      let currentRating = 0;

      stars.forEach((star) => {
        star.addEventListener("mouseover", () => {
          highlightStars(parseInt(star.dataset.value));
        });

        star.addEventListener("mouseout", () => {
          highlightStars(currentRating);
        });

        star.addEventListener("click", () => {
          currentRating = parseInt(star.dataset.value);
          ratingInput.value = currentRating;
          highlightStars(currentRating);
        });
      });

      function highlightStars(rating) {
        stars.forEach((star) => {
          const value = parseInt(star.dataset.value);
          star.classList.toggle("text-yellow-400", value <= rating);
          star.classList.toggle("text-gray-300", value > rating);
        });
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
  const logModal = document.getElementById("logModal");

  logModal.addEventListener("hidden.bs.modal", () => {
    logModal.querySelectorAll("input[type='text']").forEach((el) => (el.value = ""));

    document.getElementById("seasonSelect").value = "";
    document.getElementById("episodeSelect").value = "";

    logModal.querySelector("textarea").value = "";

    logModal.querySelector("input[type='checkbox']").checked = false;

    const stars = logModal.querySelectorAll("#starRating span");
    const ratingInput = document.getElementById("ratingValue");
    ratingInput.value = 0;

    stars.forEach((star) => {
      star.classList.remove("text-yellow-400");
      star.classList.add("text-gray-300");
    });

    currentRating = 0;
  });
</script>


  </body>
</html>
