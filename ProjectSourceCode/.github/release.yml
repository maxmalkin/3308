# ─────────────────────────────────────────────
# release.yml — Automated Release Notes config
#
# GitHub uses this to auto-generate release notes
# by grouping PRs into sections based on their labels.
#
# To use: when creating a PR on GitHub, add one of
# these labels: feature, bug, ci, documentation
# ─────────────────────────────────────────────

changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: "New Features"
      labels:
        - feature
    - title: "Bug Fixes"
      labels:
        - bug
    - title: "CI/CD"
      labels:
        - ci
    - title: "Documentation"
      labels:
        - documentation
