name: Pillarboxd CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.18.3

      - name: Install Dependencies
        run: pnpm install

      - name: Run Linter
        run: pnpm lint

# We will add the Supabase start and Test commands here once the test suite is ready