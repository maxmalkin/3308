services:
  - type: web
    name: pillarboxd-server
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUB
        sync: false
      - key: SUPABASE_SECRET
        sync: false
      - key: TVDB_READ_TOKEN
        sync: false
      - key: TVDB_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false

  - type: web
    name: pillarboxd-client
    runtime: docker
    dockerfilePath: ./client/Dockerfile
    dockerContext: .
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
